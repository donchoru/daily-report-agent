name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller dra.spec --noconfirm

      - name: Zip artifact
        run: Compress-Archive -Path "dist\dra.exe" -DestinationPath "dist\dra-windows-x64.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dra-windows-x64.zip
